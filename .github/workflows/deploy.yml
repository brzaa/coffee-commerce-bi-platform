name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
    steps:
      - name: Check deployment configuration
        id: deploy-config
        run: |
          if [ -n "$VPS_HOST" ] && [ -n "$VPS_USER" ] && [ -n "$VPS_SSH_KEY" ] && [ -n "$VPS_APP_DIR" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping VPS deploy because one or more required secrets are missing: VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_APP_DIR."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        if: steps.deploy-config.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ env.VPS_APP_DIR }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ -z "$APP_DIR" ]; then
              echo "VPS_APP_DIR secret is required"
              exit 1
            fi

            mkdir -p "$APP_DIR"
            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            else
              git -C "$APP_DIR" fetch origin main
              git -C "$APP_DIR" reset --hard origin/main
            fi

            cd "$APP_DIR"
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "Created .env from .env.example. Update passwords on the VPS."
            fi

            docker compose up -d --build warehouse metabase nginx
            docker compose --profile pipeline run --rm pipeline
            docker compose --profile setup run --rm metabase-setup || true
            docker compose ps
