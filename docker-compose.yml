name: coffee-commerce-bi-platform

services:
  warehouse:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coffee_warehouse}
      POSTGRES_USER: ${POSTGRES_USER:-coffee_bi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_locally}
    volumes:
      - warehouse_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_SITE_NAME: ${MB_SITE_NAME:-Coffee Commerce BI Demo}
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      warehouse:
        condition: service_healthy
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - metabase

  pipeline:
    build: .
    profiles: ["pipeline"]
    command: ["python", "-m", "pipeline.run_pipeline"]
    environment:
      PREFECT_SERVER_EPHEMERAL_STARTUP_TIMEOUT_SECONDS: ${PREFECT_SERVER_EPHEMERAL_STARTUP_TIMEOUT_SECONDS:-120}
      DB_HOST: ${DB_HOST:-warehouse}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-coffee_warehouse}
      DB_USER: ${DB_USER:-coffee_bi}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_locally}
      DBT_TARGET: ${DBT_TARGET:-dev}
      DBT_PROFILES_DIR: /app/analytics
    volumes:
      - .:/app
    depends_on:
      warehouse:
        condition: service_healthy

  metabase-setup:
    build: .
    profiles: ["setup"]
    command: ["python", "-m", "pipeline.setup_metabase"]
    environment:
      MB_URL: ${MB_URL:-http://metabase:3000}
      MB_SITE_NAME: ${MB_SITE_NAME:-Coffee Commerce BI Demo}
      MB_ADMIN_EMAIL: ${MB_ADMIN_EMAIL:-demo@coffee-bi.local}
      MB_ADMIN_PASSWORD: ${MB_ADMIN_PASSWORD:-change_me_metabase}
      DB_HOST: ${DB_HOST:-warehouse}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-coffee_warehouse}
      DB_USER: ${DB_USER:-coffee_bi}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_locally}
    volumes:
      - .:/app
    depends_on:
      warehouse:
        condition: service_healthy
      metabase:
        condition: service_started

volumes:
  warehouse_data:
  metabase_data:
